name: Monthly Dev Metrics

on:
  schedule:
    # Executa no dia 1 de cada mês às 09:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    # Permite execução manual com inputs
    inputs:
      period:
        description: 'Período de análise'
        required: false
        default: 'last_month'
        type: choice
        options:
          - all
          - last_month
          - last_3_months
          - last_6_months
          - custom
      
      start_date:
        description: 'Data inicial (YYYY-MM-DD) - apenas para período custom'
        required: false
        type: string
      
      end_date:
        description: 'Data final (YYYY-MM-DD) - apenas para período custom'
        required: false
        type: string
      
      repositories:
        description: 'Repositórios (separados por espaço, deixe vazio para usar config.yaml)'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate metrics report
        id: metrics
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          echo "Gerando métricas de desenvolvimento..."
          
          # Construir comando com argumentos baseado nos inputs
          CMD="python generate_metrics.py"
          
          # Adicionar período se especificado
          if [ -n "${{ github.event.inputs.period }}" ]; then
            CMD="$CMD --period ${{ github.event.inputs.period }}"
          fi
          
          # Adicionar datas se especificadas (para período custom)
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            CMD="$CMD --start ${{ github.event.inputs.start_date }}"
          fi
          
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            CMD="$CMD --end ${{ github.event.inputs.end_date }}"
          fi
          
          # Adicionar repositórios se especificados
          if [ -n "${{ github.event.inputs.repositories }}" ]; then
            CMD="$CMD --repos ${{ github.event.inputs.repositories }}"
          fi
          
          # Executar script e capturar saída
          if $CMD > metrics_output.txt 2>&1; then
            echo "metrics_generated=true" >> $GITHUB_OUTPUT
          else
            echo "metrics_generated=false" >> $GITHUB_OUTPUT
            cat metrics_output.txt
            exit 1
          fi
      
      - name: Get current month/year
        id: date
        run: |
          # Obter mês e ano anterior
          MONTH=$(date -d "last month" +%B)
          YEAR=$(date -d "last month" +%Y)
          MONTH_PT=$(case $MONTH in
            January) echo "Janeiro";;
            February) echo "Fevereiro";;
            March) echo "Março";;
            April) echo "Abril";;
            May) echo "Maio";;
            June) echo "Junho";;
            July) echo "Julho";;
            August) echo "Agosto";;
            September) echo "Setembro";;
            October) echo "Outubro";;
            November) echo "Novembro";;
            December) echo "Dezembro";;
          esac)
          echo "month=$MONTH_PT" >> $GITHUB_OUTPUT
          echo "year=$YEAR" >> $GITHUB_OUTPUT
      
      - name: Create issue with metrics
        if: steps.metrics.outputs.metrics_generated == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const metricsOutput = fs.readFileSync('metrics_output.txt', 'utf8');
            
            const month = '${{ steps.date.outputs.month }}';
            const year = '${{ steps.date.outputs.year }}';
            
            // Obter informações de configuração dos inputs
            const period = '${{ github.event.inputs.period }}' || 'last_month';
            const startDate = '${{ github.event.inputs.start_date }}' || '';
            const endDate = '${{ github.event.inputs.end_date }}' || '';
            const repos = '${{ github.event.inputs.repositories }}' || 'Configurado em config.yaml';
            
            let periodInfo = '';
            if (period === 'custom' && startDate && endDate) {
              periodInfo = `Período personalizado: ${startDate} a ${endDate}`;
            } else if (period === 'all') {
              periodInfo = 'Todo o histórico disponível';
            } else if (period === 'last_month') {
              periodInfo = 'Último mês';
            } else if (period === 'last_3_months') {
              periodInfo = 'Últimos 3 meses';
            } else if (period === 'last_6_months') {
              periodInfo = 'Últimos 6 meses';
            }
            
            const issueBody = `# 📊 Métricas de Desenvolvimento - ${month}/${year}
            
            Relatório automático gerado em: ${new Date().toLocaleString('pt-BR', { timeZone: 'UTC' })}
            
            ## Configuração de Análise
            
            **Repositórios:** ${repos}
            **Período:** ${periodInfo}
            
            ## Resultados
            
            \`\`\`
            ${metricsOutput}
            \`\`\`
            
            ---
            
            > 🤖 Este relatório foi gerado automaticamente pelo workflow \`monthly-metrics.yml\`
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Métricas de Desenvolvimento - ${month}/${year}`,
              body: issueBody,
              labels: ['metrics', 'automated']
            });
